#
# Kube-API-Linter (KAL) config for net-operator-api types.
# Requires golangci-lint with the kube-api-linter plugin.
version: "2"
run:
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - kubeapilinter
  settings:
    custom:
      kubeapilinter:
        type: module
        description: KAL is the Kube-API-Linter and lints Kube like APIs based on API conventions and best practices.
        settings:
          linters:
            enable:
              - "commentstart"
              - "conditions"
              - "conflictingmarkers"
              - "duplicatemarkers"
              - "forbiddenmarkers"
              - "integers"
              - "jsontags"
              - "maxlength"
              - "nobools"
              - "nodurations"
              - "nofloats"
              - "nomaps"
              - "nonullable"
              - "notimestamp"
              - "optionalfields"
              - "optionalorrequired"
              - "requiredfields"
              - "ssatags"
              - "statusoptional"
              - "statussubresource"
              - "uniquemarkers"
            disable:
              - "*"
          lintersConfig:
            conflictingmarkers:
              conflicts:
                - name: "default_vs_required"
                  sets:
                    - ["default", "kubebuilder:default"]
                    - ["required", "kubebuilder:validation:Required", "k8s:required"]
                  description: "A field with a default value cannot be required"
            forbiddenmarkers:
              markers:
                - identifier: "kubebuilder:default"
                - identifier: "default"
            conditions:
              isFirstField: Warn
              usePatchStrategy: Forbid
              useProtobuf: Forbid
            optionalfields:
              pointers:
                preference: WhenRequired
                policy: SuggestFix
              omitempty:
                policy: SuggestFix
  exclusions:
    generated: strict
    paths:
      - zz_generated.*\.go$
      - vendored_openapi\.go$
      - .*_test\.go$
      - (^|/)test/
    rules:
      # KAL runs _only_ on API dirs (paths relative to component root)
      - path-except: '(^|/)(api)/'
        linters:
          - kubeapilinter

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
